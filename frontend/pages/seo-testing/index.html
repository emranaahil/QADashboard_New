<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO Testing — QA Dashboard</title>
  <link rel="stylesheet" href="/shared/css/enterprise.css">
</head>
<body>
  <div id="ep-root">
    <div class="ep-content" id="ep-content">
      <div class="ep-page-stack">
      <div class="ep-card">
        <div class="ep-page-toolbar">
          <h2>SEO Testing</h2>
          <div class="ep-segmented" role="tablist" aria-label="SEO mode">
            <button type="button" id="modeSingle" class="active" role="tab" aria-selected="true">Single Page</button>
            <button type="button" id="modeFull" role="tab" aria-selected="false">Full Website</button>
          </div>
        </div>
        <div class="ep-field">
          <label class="ep-label" for="testUrl" id="urlLabel">URL</label>
          <input type="url" id="testUrl" class="ep-input" placeholder="https://example.com">
        </div>
        <div id="pageEstimate" class="ep-warning hidden" role="status"></div>
        <div class="ep-btn-row">
          <button type="button" id="runJobBtn" class="ep-btn ep-btn-primary">Run SEO Test</button>
          <button type="button" id="cancelJobBtn" class="ep-btn hidden">Cancel</button>
          <button type="button" id="openReportBtn" class="ep-btn hidden">Open Report</button>
        </div>
      </div>
      <div class="ep-grid-2">
        <div class="ep-card">
          <div class="ep-card-title">Execution</div>
          <div id="job-status"></div>
          <div class="ep-progress"><div id="job-progress-fill" class="ep-progress-fill" style="width:0%"></div></div>
          <div class="ep-progress-meta">
            <span id="job-progress-text">0%</span>
            <span id="job-pages">—</span>
          </div>
          <p id="job-message" class="ep-job-message"></p>
          <div id="job-error" class="ep-warning hidden" role="alert"></div>
          <div id="resultsPanel" class="hidden ep-results-panel">
            <div class="ep-card-title">Results</div>
            <div id="resultsBody" class="ep-results-body"></div>
            <div class="ep-results-actions" id="resultsActions"></div>
          </div>
        </div>
        <div class="ep-card">
          <div class="ep-card-title">Checks</div>
          <ul class="ep-check-list">
            <li>Meta Tags</li>
            <li>Open Graph</li>
            <li>Structured Data</li>
            <li>Accessibility</li>
            <li>Core Web Vitals</li>
            <li>Broken Links</li>
          </ul>
        </div>
      </div>
      <div class="ep-card">
        <div class="ep-card-title">Test History</div>
        <div id="job-history"></div>
      </div>
      </div>
    </div>
  </div>
  <script src="/shared/js/api.js"></script>
  <script src="/shared/js/toast.js"></script>
  <script src="/shared/js/logsDrawer.js"></script>
  <script src="/shared/js/enterpriseShell.js"></script>
  <script src="/shared/js/jobRunner.js"></script>
  <script src="app.js"></script>
</body>
</html>
