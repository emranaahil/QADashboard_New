<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — QA Dashboard</title>
  <link rel="stylesheet" href="/shared/css/enterprise.css">
</head>
<body>
  <div id="ep-root">
    <div class="ep-content" id="ep-content">
      <div class="ep-page-stack ep-page-stack-wide">
        <div class="ep-card">
          <div class="ep-page-toolbar">
            <h2>Reports Center</h2>
          </div>
          <div class="ep-tabs" role="tablist" aria-label="Report collections">
            <button type="button" class="active" data-tab="recent">Recent</button>
            <button type="button" data-tab="pinned">Pinned</button>
            <button type="button" data-tab="favorites">Favorites</button>
          </div>
          <div id="reports-list"><div class="ep-skeleton ep-skeleton-row"></div></div>
        </div>
      </div>
    </div>
  </div>
  <script src="/shared/js/api.js"></script>
  <script src="/shared/js/queryCache.js"></script>
  <script src="/shared/js/toast.js"></script>
  <script src="/shared/js/logsDrawer.js"></script>
  <script src="/shared/js/enterpriseShell.js"></script>
  <script src="app.js"></script>
</body>
</html>
