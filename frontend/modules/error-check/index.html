<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error Check — QA Toolkit</title>
  <link rel="stylesheet" href="/shared/css/base.css">
  <link rel="stylesheet" href="/shared/css/module-page.css">
</head>
<body data-module="error-check">
  <header id="app-shell" class="app-shell"></header>
  <div class="module-page">
    <section class="card" id="runner-section">
      <h2 class="card-title">Run Error Check</h2>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:0.75rem;">
        <div class="form-group"><label class="form-label">URL</label><input type="text" id="siteUrl" class="form-input" value="https://example.com"></div>
        <div class="form-group"><label class="form-label">Max Pages</label><input type="number" id="maxPages" class="form-input" value="100"></div>
        <div class="form-group"><label class="form-label">Max Depth</label><input type="number" id="maxDepth" class="form-input" value="5"></div>
      </div>
      <button id="startBtn" class="btn btn-primary">▶ Start Check</button>
      <p id="statusLine" class="form-hint" style="margin-top:0.75rem;"></p>
    </section>

    <section id="progressSection" class="card hidden">
      <h2 class="card-title">Progress</h2>
      <div class="stats-grid">
        <div class="stat-item"><span class="stat-value" id="urlsProcessed">0</span><span class="stat-label">Processed</span></div>
        <div class="stat-item highlight"><span class="stat-value" id="errorCount">0</span><span class="stat-label">Errors</span></div>
      </div>
      <p id="currentUrl" class="form-hint"></p>
    </section>

    <section id="errorSection" class="card hidden">
      <div class="alert alert-error" id="errorMessage"></div>
    </section>

    <div class="module-grid has-sidebar" style="margin-top:1.25rem;">
      <aside class="card">
        <h2 class="card-title">Saved Reports</h2>
        <ul id="report-list" class="report-list"></ul>
      </aside>
      <section>
        <div id="report-actions" class="report-actions"></div>
        <div id="report-viewer" class="report-viewer card"></div>
      </section>
    </div>
  </div>
  <script src="/shared/js/api.js"></script>
  <script src="/shared/js/shell.js"></script>
  <script src="/shared/js/reportPanel.js"></script>
  <script src="reports.js"></script>
  <script src="app.js"></script>
</body>
</html>
