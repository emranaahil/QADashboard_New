<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyword Check — QA Toolkit</title>
  <link rel="stylesheet" href="/shared/css/base.css">
  <link rel="stylesheet" href="/shared/css/module-page.css">
</head>
<body data-module="keyword-check">
  <header id="app-shell" class="app-shell"></header>
  <div class="module-page">
    <section class="card" id="runner-section">
      <h2 class="card-title">Run Keyword Scan</h2>
      <div class="form-group">
        <label class="form-label" for="websiteUrl">Website URL</label>
        <input type="url" id="websiteUrl" class="form-input" placeholder="https://example.com">
      </div>
      <div class="form-group">
        <label class="form-label" for="keywords">Keywords (one per line)</label>
        <textarea id="keywords" class="form-textarea" rows="4" placeholder="keyword1&#10;keyword2"></textarea>
      </div>
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
        <button id="startScanBtn" class="btn btn-primary">▶ Start Scan</button>
        <button id="clearBtn" class="btn btn-secondary">Clear</button>
      </div>
    </section>

    <section id="progressSection" class="card hidden">
      <h2 class="card-title">Scan Progress</h2>
      <div class="stats-grid">
        <div class="stat-item"><span class="stat-value" id="urlsDiscovered">0</span><span class="stat-label">Discovered</span></div>
        <div class="stat-item"><span class="stat-value" id="urlsProcessed">0</span><span class="stat-label">Processed</span></div>
        <div class="stat-item"><span class="stat-value" id="currentBatch">0</span><span class="stat-label">Batch</span></div>
        <div class="stat-item highlight"><span class="stat-value" id="matchesFound">0</span><span class="stat-label">Matches</span></div>
      </div>
      <div class="progress-container">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <span class="progress-text" id="progressText">0%</span>
      </div>
      <p><span class="status-dot" id="statusDot"></span> <span id="statusText">Initializing...</span></p>
    </section>

    <section id="errorSection" class="card hidden">
      <div class="alert alert-error" id="errorMessage"></div>
      <button id="retryBtn" class="btn btn-primary">Try Again</button>
    </section>

    <div class="module-grid has-sidebar" style="margin-top:1.25rem;">
      <aside class="card">
        <h2 class="card-title">Saved Reports</h2>
        <ul id="report-list" class="report-list"></ul>
      </aside>
      <section>
        <div id="report-actions" class="report-actions"></div>
        <div id="live-results" class="card hidden"></div>
        <div id="report-viewer" class="report-viewer card"></div>
      </section>
    </div>
  </div>
  <script src="/shared/js/api.js"></script>
  <script src="/shared/js/shell.js"></script>
  <script src="/shared/js/reportPanel.js"></script>
  <script src="reports.js"></script>
  <script src="app.js"></script>
</body>
</html>
