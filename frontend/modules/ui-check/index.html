<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Check — QA Toolkit</title>
  <link rel="stylesheet" href="/shared/css/base.css">
  <link rel="stylesheet" href="/shared/css/module-page.css">
  <link rel="stylesheet" href="/shared/css/job-runner.css">
</head>
<body data-module="ui-check">
  <header id="app-shell" class="app-shell"></header>
  <div class="module-page">
    <section class="card job-runner">
      <h2 class="card-title">Run UI Check</h2>
      <div class="form-group">
        <label class="form-label" for="testUrl">Website URL</label>
        <input type="url" id="testUrl" class="form-input" placeholder="https://example.com">
      </div>
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;">
        <button id="runJobBtn" class="btn btn-primary">▶ Run UI Check</button>
        <button id="cancelJobBtn" class="btn btn-secondary" style="display:none;">Cancel</button>
        <button id="openReportBtn" class="btn btn-outline hidden" type="button">📄 Open Report</button>
      </div>
      <div class="job-status-row">
        <div id="job-status"></div>
      </div>
      <div class="job-progress-wrap">
        <div class="progress-bar"><div id="job-progress-fill" class="progress-fill" style="width:0%"></div></div>
        <span id="job-progress-text" class="progress-text">0%</span>
      </div>
      <p id="job-message" class="form-hint"></p>
      <div id="job-error" class="alert alert-error hidden"></div>
    </section>

    <section class="card">
      <h2 class="card-title">Test History</h2>
      <div id="job-history"></div>
    </section>

    <div class="module-grid has-sidebar" style="margin-top:1.25rem;">
      <aside class="card">
        <h2 class="card-title">Saved Reports</h2>
        <ul id="report-list" class="report-list"></ul>
      </aside>
      <section>
        <div id="report-actions" class="report-actions"></div>
        <div id="report-viewer" class="report-viewer card"></div>
      </section>
    </div>
  </div>
  <script src="/shared/js/api.js"></script>
  <script src="/shared/js/shell.js"></script>
  <script src="/shared/js/jobRunner.js"></script>
  <script src="/shared/js/reportPanel.js"></script>
  <script src="reports.js"></script>
  <script src="app.js"></script>
</body>
</html>
