# Render Blueprint — QA Dashboard
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy: connect repo → Render detects render.yaml → Deploy Blueprint
# Or: Dashboard → New → Blueprint → select repository
#
# NOTE: Playwright requires at least Starter plan (512MB+ RAM).
# Free tier is insufficient for browser automation workloads.

services:
  - type: web
    name: qa-dashboard
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /api/health
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_PORT
        value: 3000
      - key: API_URL
        value: http://127.0.0.1:3000
      - key: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
        value: "true"
      - key: PLAYWRIGHT_CHROMIUM_SANDBOX
        value: "false"
      - key: JOB_RECOVER_ON_STARTUP
        value: "false"
      - key: STORAGE_ROOT
        value: /app/data
      - key: RENDER
        value: "true"
      - key: LIVE_REPORT_TTL_MINUTES
        value: "10"
      - key: FULL_UI_MAX_PAGES_CAP
        value: "12"
      - key: JOB_STALE_MS
        value: "600000"
      - key: JOB_HEARTBEAT_MS
        value: "45000"

    # Persistent disk for reports/jobs (survives redeploys)
    disk:
      name: qa-data
      mountPath: /app/data
      sizeGB: 5